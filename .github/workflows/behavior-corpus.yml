name: Behavior corpus (CC real provider)

# T6b — the convergence of the testing fix and the unit-of-work fix.
#
# Brings up the real cross-service stack (postgres + auth + config-service +
# command-center) PLUS a real llm-proxy whose `live` model is a cheap cloud model
# (gpt-4.1-nano via the REST backend), flips CC's llm.interface to ChatGPTOpenAI,
# and routes a voice-command corpus through CC's REAL native tool-calling path.
# The PR fast lane proves wiring against fakes; THIS proves behavior against a
# real model — the wrong-tool / answers-the-literal-question class of regression.
#
# Runs nightly + on demand. NOT on pull_request: on a public repo, secrets are
# not exposed to fork PRs, and schedule/workflow_dispatch only run in the
# base-repo context, so the usage-capped OPENAI_API_KEY stays bounded to people
# with write access. Costs pennies per run (~30 utterances x gpt-4.1-nano).

on:
  schedule:
    # 08:42 UTC nightly (~03:42 US-Eastern). Off the top-of-hour to dodge the
    # GitHub Actions scheduled-job congestion window, and offset from llm-proxy's
    # own behavior-nightly (08:17) so they don't contend for the same key burst.
    - cron: '42 8 * * *'
  workflow_dispatch: {}

concurrency:
  group: behavior-corpus
  cancel-in-progress: true

# packages: read lets GITHUB_TOKEN pull the ghcr.io :dev / :dev-cpu images
# (auth, config-service, command-center, llm-proxy-api). For private packages,
# each package's "Manage Actions access" must include this repo — or flip them
# public to skip per-package setup.
permissions:
  contents: read
  packages: read

jobs:
  behavior:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Injected into the llm-proxy overlay's JARVIS_REST_AUTH_TOKEN at compose
      # interpolation time. Empty until the secret is set -> guard no-ops.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard — require the OpenAI key
        # If the secret isn't configured yet, warn and pass green (rather than
        # spam nightly red). Once OPENAI_API_KEY is set, the lane runs for real
        # and a routing regression turns this job red.
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning title=Behavior corpus idle::OPENAI_API_KEY secret is not set on this repo; the CC behavior corpus cannot run. Add a usage-capped key:  gh secret set OPENAI_API_KEY --repo $GITHUB_REPOSITORY"
            echo "HAS_KEY=false" >> "$GITHUB_ENV"
          else
            echo "HAS_KEY=true" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        if: env.HAS_KEY == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        if: env.HAS_KEY == 'true'
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-behavior-corpus-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-behavior-corpus-
            ${{ runner.os }}-pip-

      - name: Install test-client dependencies
        if: env.HAS_KEY == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Set up Docker Buildx
        if: env.HAS_KEY == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.HAS_KEY == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Phase 1 — bring up deps (postgres + auth + config-service + mqtt)
        if: env.HAS_KEY == 'true'
        run: |
          docker compose -f docker-compose.ci.yaml \
            --profile core up -d --wait \
            postgres jarvis-auth jarvis-config-service mosquitto
          echo "=== compose ps after phase 1 ==="
          docker compose -f docker-compose.ci.yaml ps

      - name: Seed auth + config-service (point discovery at the real proxy)
        if: env.HAS_KEY == 'true'
        env:
          AUTH_URL: http://localhost:7701
          CONFIG_URL: http://localhost:7700
          AUTH_ADMIN_TOKEN: ci-auth-admin-token
          CONFIG_ADMIN_TOKEN: ci-auth-admin-token
          # Behavior lane: register llm-proxy at the REAL API container so CC's
          # service discovery routes /v1/chat/completions through it, not the
          # (absent) host fake.
          LLM_PROXY_HOST: jarvis-llm-proxy-api
          LLM_PROXY_PORT: "7704"
        run: |
          bash compose/seed.sh

      - name: Phase 1.5 — bring up real llm-proxy (REST -> gpt-4.1-nano)
        if: env.HAS_KEY == 'true'
        run: |
          # OPENAI_API_KEY (job env) interpolates into the overlay's
          # JARVIS_REST_AUTH_TOKEN here. --wait blocks on both healthchecks.
          docker compose -f docker-compose.ci.yaml \
            -f compose/ci-overlays/llm-proxy-behavior.yaml \
            --profile core --profile behavior up -d --wait \
            jarvis-llm-proxy-model jarvis-llm-proxy-api
          echo "=== compose ps after phase 1.5 ==="
          docker compose -f docker-compose.ci.yaml \
            -f compose/ci-overlays/llm-proxy-behavior.yaml ps

      - name: Phase 2 — bring up CC pointed at the real proxy
        if: env.HAS_KEY == 'true'
        env:
          JARVIS_CC_APP_KEY: ${{ env.JARVIS_CC_APP_KEY }}
        run: |
          # The overlay overrides CC's JARVIS_LLM_PROXY_API_URL ->
          # jarvis-llm-proxy-api:7704 (belt-and-suspenders with the config-service
          # registration from seed.sh).
          docker compose -f docker-compose.ci.yaml \
            -f compose/ci-overlays/llm-proxy-behavior.yaml \
            --profile core --profile behavior up -d --wait \
            jarvis-command-center
          echo "=== compose ps after phase 2 ==="
          docker compose -f docker-compose.ci.yaml \
            -f compose/ci-overlays/llm-proxy-behavior.yaml ps

      - name: Phase 2.5 — register node in CC
        if: env.HAS_KEY == 'true'
        env:
          CC_URL: http://localhost:7703
          CC_ADMIN_KEY: ci-admin-key
          CC_HOUSEHOLD_ID: ${{ env.CC_HOUSEHOLD_ID }}
        run: |
          set -e
          NODE_ID="ci-node-001"
          BODY="{\"node_id\":\"$NODE_ID\",\"household_id\":\"$CC_HOUSEHOLD_ID\",\"room\":\"ci-room\",\"name\":\"CI Node\"}"
          RESP_FILE=/tmp/cc_node_resp.json
          STATUS=$(curl -sS -o "$RESP_FILE" -w "%{http_code}" -X POST \
            "$CC_URL/api/v0/admin/nodes" \
            -H "X-API-Key: $CC_ADMIN_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 300 ]]; then
            echo "::error::CC /admin/nodes failed: HTTP $STATUS"
            cat "$RESP_FILE"
            exit 1
          fi
          CC_NODE_KEY=$(python3 -c "import json; print(json.load(open('$RESP_FILE'))['node_key'])")
          {
            echo "CC_NODE_ID=$NODE_ID"
            echo "CC_NODE_KEY=$CC_NODE_KEY"
          } >> "$GITHUB_ENV"
          echo "Captured CC_NODE_ID=$NODE_ID, CC_NODE_KEY length=${#CC_NODE_KEY}"

      - name: Phase 2.6 — flip CC llm.interface to ChatGPTOpenAI
        if: env.HAS_KEY == 'true'
        env:
          CC_URL: http://localhost:7703
          CC_USER_JWT: ${{ env.CC_USER_JWT }}
        run: |
          # llm.interface is a DB-only setting (no env fallback), default
          # Qwen25MediumUntrained. Writing it via CC's own settings API (PUT
          # /settings/{key}, superuser-gated) flips CC onto the native
          # tool-calling provider. get_model_service() builds a fresh
          # ModelService() per request that reads this live, so seeding it before
          # the corpus runs is sufficient.
          set -e
          STATUS=$(curl -sS -o /tmp/set_iface.json -w "%{http_code}" -X PUT \
            "$CC_URL/settings/llm.interface" \
            -H "Authorization: Bearer $CC_USER_JWT" \
            -H "Content-Type: application/json" \
            -d '{"value":"ChatGPTOpenAI"}')
          echo "PUT /settings/llm.interface -> HTTP $STATUS: $(cat /tmp/set_iface.json)"
          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 300 ]]; then
            echo "::error::Failed to set llm.interface=ChatGPTOpenAI (HTTP $STATUS)"
            exit 1
          fi
          # Bust the in-process settings cache so the next request resolves the
          # new provider immediately (best-effort; the PUT usually busts it too).
          curl -sS -X POST "$CC_URL/settings/invalidate-cache" \
            -H "Authorization: Bearer $CC_USER_JWT" -o /dev/null \
            && echo "settings cache invalidated" \
            || echo "::warning::invalidate-cache call failed (non-fatal)"
          # Confirm the active value.
          curl -sS "$CC_URL/settings/llm.interface" \
            -H "Authorization: Bearer $CC_USER_JWT" || true

      - name: Run behavior corpus (live, pinned gpt-4.1-nano snapshot)
        if: env.HAS_KEY == 'true'
        env:
          CC_URL: http://localhost:7703
          CC_NODE_ID: ${{ env.CC_NODE_ID }}
          CC_NODE_KEY: ${{ env.CC_NODE_KEY }}
        run: |
          pytest tests/test_cc_behavior_corpus.py -m behavior \
            --tb=short -v

      - name: Tail service logs on failure
        if: ${{ failure() && env.HAS_KEY == 'true' }}
        run: |
          # Full CC log (not a tail) — the corpus runs ~30 conversations and an
          # early failure scrolls off a short tail. The stack is small, so dump
          # all of it for diagnosis.
          echo "=== CC logs (full) ==="
          docker compose -f docker-compose.ci.yaml logs jarvis-command-center || true
          echo "=== llm-proxy API logs (tail) ==="
          docker compose -f docker-compose.ci.yaml \
            -f compose/ci-overlays/llm-proxy-behavior.yaml \
            logs --tail=80 jarvis-llm-proxy-api || true
          echo "=== llm-proxy model service logs (tail) ==="
          docker compose -f docker-compose.ci.yaml \
            -f compose/ci-overlays/llm-proxy-behavior.yaml \
            logs --tail=80 jarvis-llm-proxy-model || true
          echo "=== auth logs (tail) ==="
          docker compose -f docker-compose.ci.yaml logs --tail=40 jarvis-auth || true

      - name: Tear down compose stack
        if: ${{ always() && env.HAS_KEY == 'true' }}
        run: |
          docker compose -f docker-compose.ci.yaml \
            -f compose/ci-overlays/llm-proxy-behavior.yaml \
            --profile core --profile behavior down -v --remove-orphans || true
