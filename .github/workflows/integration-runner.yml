name: Integration Runner

# Receives `repository_dispatch` events from service repos when a PR opens
# (see <service>/.github/workflows/integration-trigger.yml). Runs the cross-
# service integration suite, parses results via tools/parse_junit.py, and
# posts a `<!-- integration-test-results:v1 -->` comment back on the
# originating PR plus a check-run status.
#
# Also exposes `workflow_dispatch` so the loop can be re-triggered manually
# while iterating on the runner itself.
#
# Required secrets (set in jarvis-integration-tests repo settings):
#   INTEGRATION_COMMENT_TOKEN — fine-grained PAT with `pull-requests:write`
#                               and `commit-statuses:write` on each service
#                               repo that can dispatch here. (The Checks API
#                               is GitHub-App-only; commit statuses are the
#                               PAT-accessible equivalent.)

on:
  repository_dispatch:
    types: [pr-integration]
  workflow_dispatch:
    inputs:
      service:
        description: "Originating service (e.g. jarvis-command-center)"
        required: true
      pr_number:
        description: "PR number in the originating repo"
        required: true
      head_sha:
        description: "HEAD SHA of the PR"
        required: true
      originating_repo:
        description: "Full repo (owner/name) where the PR lives"
        required: true
      qa_plan_comment_id:
        description: "Optional: roadmap issue comment ID for the QA plan"
        required: false
        default: ""
      plan_cases:
        description: "Comma-separated CASE-IDs from the QA plan"
        required: false
        default: "CASE-001,CASE-002,CASE-003,CASE-101,CASE-102,CASE-103,CASE-104,CASE-201,CASE-202,CASE-203,CASE-204,CASE-205,CASE-206,CASE-207,CASE-208,CASE-209,CASE-210,CASE-211,CASE-212,CASE-213,CASE-214,CASE-215,CASE-216,CASE-217,CASE-218,CASE-219,CASE-220,CASE-221,CASE-222,CASE-223"
      linked_prs:
        description: "JSON map of {repo_name: branch_or_sha} for cross-service PR dependencies"
        required: false
        default: "{}"

concurrency:
  group: integration-${{ github.event.client_payload.originating_repo || inputs.originating_repo }}-${{ github.event.client_payload.pr_number || inputs.pr_number }}
  cancel-in-progress: true

# `packages: read` lets the workflow's GITHUB_TOKEN pull the ghcr.io :dev
# images for jarvis-auth and jarvis-config-service. For private packages,
# each package's "Manage Actions access" must include this repo
# (jarvis-integration-tests) at
# https://github.com/users/alexberardi/packages/container/<pkg>/settings —
# or the packages can be flipped to public to skip per-package setup.
permissions:
  contents: read
  packages: read

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Resolve dispatch payload
        id: payload
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            SERVICE="${{ github.event.client_payload.service }}"
            PR_NUMBER="${{ github.event.client_payload.pr_number }}"
            HEAD_SHA="${{ github.event.client_payload.head_sha }}"
            ORIGINATING_REPO="${{ github.event.client_payload.originating_repo }}"
            QA_PLAN_COMMENT_ID="${{ github.event.client_payload.qa_plan_comment_id }}"
            PLAN_CASES="${{ github.event.client_payload.plan_cases }}"
            LINKED_PRS='${{ github.event.client_payload.linked_prs }}'
          else
            SERVICE="${{ inputs.service }}"
            PR_NUMBER="${{ inputs.pr_number }}"
            HEAD_SHA="${{ inputs.head_sha }}"
            ORIGINATING_REPO="${{ inputs.originating_repo }}"
            QA_PLAN_COMMENT_ID="${{ inputs.qa_plan_comment_id }}"
            PLAN_CASES="${{ inputs.plan_cases }}"
            LINKED_PRS='${{ inputs.linked_prs }}'
          fi
          if [[ -z "$PLAN_CASES" ]]; then
            PLAN_CASES="CASE-001,CASE-002,CASE-003,CASE-101,CASE-102,CASE-103,CASE-104,CASE-201,CASE-202,CASE-203,CASE-204,CASE-205,CASE-206,CASE-207,CASE-208,CASE-209,CASE-210,CASE-211,CASE-212,CASE-213,CASE-214,CASE-215,CASE-216,CASE-217,CASE-218,CASE-219,CASE-220,CASE-221,CASE-222,CASE-223"
          fi
          if [[ -z "$LINKED_PRS" ]]; then
            LINKED_PRS="{}"
          fi
          # v2.15 fan-out: bring_up_stack=true for any service that has a
          # `from-source` overlay in compose/ci-overlays/. For those, the
          # runner checks out the PR's source into _src/{service} and the
          # overlay swaps that service's :dev image for a `build:` block.
          # All other services in the stack stay at :dev.
          #
          # Services without an overlay (jarvis-tts, jarvis-whisper-api,
          # jarvis-llm-proxy-api today) only run the fakes-only smoke
          # tests when their PRs trigger the loop.
          BRING_UP_STACK="false"
          COMPOSE_OVERLAY=""
          case "$SERVICE" in
            jarvis-command-center|jarvis-auth|jarvis-config-service)
              BRING_UP_STACK="true"
              COMPOSE_OVERLAY="compose/ci-overlays/${SERVICE}-from-source.yaml"
              ;;
          esac
          {
            echo "service=$SERVICE"
            echo "pr_number=$PR_NUMBER"
            echo "head_sha=$HEAD_SHA"
            echo "originating_repo=$ORIGINATING_REPO"
            echo "qa_plan_comment_id=$QA_PLAN_COMMENT_ID"
            echo "plan_cases=$PLAN_CASES"
            echo "linked_prs=$LINKED_PRS"
            echo "bring_up_stack=$BRING_UP_STACK"
            echo "compose_overlay=$COMPOSE_OVERLAY"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-integration-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-integration-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Check out originating service repo at PR head
        if: ${{ steps.payload.outputs.bring_up_stack == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.payload.outputs.originating_repo }}
          ref: ${{ steps.payload.outputs.head_sha }}
          # actions/checkout requires path: to be a subdirectory of the
          # workspace. Land the originator's source at _src/{service} so
          # the matching overlay's `build.context` (defaults like
          # `./_src/jarvis-auth`) finds it.
          path: _src/${{ steps.payload.outputs.service }}

      - name: Set up Docker Buildx
        if: ${{ steps.payload.outputs.bring_up_stack == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ steps.payload.outputs.bring_up_stack == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start fake LLM backend
        run: |
          nohup python -m tests.fakes.fake_llm_backend --port 7705 \
            > /tmp/fake_llm.log 2>&1 &
          echo "FAKE_LLM_PID=$!" >> "$GITHUB_ENV"

      - name: Start fake Whisper backend
        run: |
          nohup python -m tests.fakes.fake_whisper --port 7706 \
            > /tmp/fake_whisper.log 2>&1 &
          echo "FAKE_WHISPER_PID=$!" >> "$GITHUB_ENV"

      - name: Start fake TTS backend
        run: |
          nohup python -m tests.fakes.fake_tts --port 7707 \
            > /tmp/fake_tts.log 2>&1 &
          echo "FAKE_TTS_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for fakes to become healthy
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:7705/health > /dev/null \
               && curl -sf http://127.0.0.1:7706/health > /dev/null \
               && curl -sf http://127.0.0.1:7707/health > /dev/null; then
              echo "Fakes healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Fakes never became healthy"
          echo "=== fake_llm.log ===" && cat /tmp/fake_llm.log
          echo "=== fake_whisper.log ===" && cat /tmp/fake_whisper.log
          echo "=== fake_tts.log ===" && cat /tmp/fake_tts.log
          exit 1

      - name: Phase 1 — bring up deps (postgres + auth + config-service + mqtt)
        if: ${{ steps.payload.outputs.bring_up_stack == 'true' }}
        run: |
          # Start everything CC depends on, but NOT CC itself. We need
          # auth + config-service healthy first so seed.sh can register
          # CC's app-client (auth generates the key, which we then pass
          # into CC's env in phase 2).
          #
          # The compose overlay (when set) swaps the service-under-test
          # from its :dev image to a `build:` block. For an auth or
          # config-service PR the build happens in this phase.
          docker compose -f docker-compose.ci.yaml \
            ${{ steps.payload.outputs.compose_overlay && format('-f {0}', steps.payload.outputs.compose_overlay) || '' }} \
            --profile core up -d --wait \
            postgres jarvis-auth jarvis-config-service mosquitto
          echo "=== compose ps after phase 1 ==="
          docker compose -f docker-compose.ci.yaml ps

      - name: Seed auth + config-service
        if: ${{ steps.payload.outputs.bring_up_stack == 'true' }}
        env:
          AUTH_URL: http://localhost:7701
          CONFIG_URL: http://localhost:7700
          AUTH_ADMIN_TOKEN: ci-auth-admin-token
          CONFIG_ADMIN_TOKEN: ci-auth-admin-token
        run: |
          bash compose/seed.sh

      - name: Phase 2 — bring up CC with seeded app-key
        if: ${{ steps.payload.outputs.bring_up_stack == 'true' }}
        env:
          # JARVIS_CC_APP_KEY is set by seed.sh via GITHUB_ENV and gets
          # interpolated into docker-compose.ci.yaml's CC environment.
          JARVIS_CC_APP_KEY: ${{ env.JARVIS_CC_APP_KEY }}
        run: |
          # CC is built from PR source when service==jarvis-command-center
          # (the overlay overrides its image with `build:`); otherwise the
          # :dev image gets pulled. Either way the env interpolation +
          # healthcheck behave the same.
          docker compose -f docker-compose.ci.yaml \
            ${{ steps.payload.outputs.compose_overlay && format('-f {0}', steps.payload.outputs.compose_overlay) || '' }} \
            --profile core up -d --wait \
            jarvis-command-center
          echo "=== compose ps after phase 2 ==="
          docker compose -f docker-compose.ci.yaml ps

      - name: Tail CC startup logs on success
        if: ${{ steps.payload.outputs.bring_up_stack == 'true' }}
        run: |
          docker compose -f docker-compose.ci.yaml logs --tail=30 jarvis-command-center || true

      - name: Phase 2.5 — register node in CC
        if: ${{ steps.payload.outputs.bring_up_stack == 'true' }}
        env:
          CC_URL: http://localhost:7703
          CC_ADMIN_KEY: ci-admin-key
          CC_HOUSEHOLD_ID: ${{ env.CC_HOUSEHOLD_ID }}
        run: |
          # CC's POST /admin/nodes does TWO things in one shot:
          #   1. Registers the node with jarvis-auth via /internal/nodes/register
          #      (which auto-grants the calling app — command-center — service
          #      access). This is the auth-side credential issuance.
          #   2. Inserts a row into CC's local `nodes` table (the row that
          #      CC's verify_api_key needs — see app/deps.py:145-148; if the
          #      row is missing CC returns 401 "Node not configured locally"
          #      even when auth says valid).
          # Both rows have to exist for CC to accept X-API-Key. Calling CC's
          # endpoint is the natural unified path; the alternative was
          # registering in auth via seed.sh and then INSERTing into CC's DB,
          # which doubled the surface area without buying anything.
          set -e
          NODE_ID="ci-node-001"
          BODY="{\"node_id\":\"$NODE_ID\",\"household_id\":\"$CC_HOUSEHOLD_ID\",\"room\":\"ci-room\",\"name\":\"CI Node\"}"
          RESP_FILE=/tmp/cc_node_resp.json
          STATUS=$(curl -sS -o "$RESP_FILE" -w "%{http_code}" -X POST \
            "$CC_URL/api/v0/admin/nodes" \
            -H "X-API-Key: $CC_ADMIN_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 300 ]]; then
            echo "::error::CC /admin/nodes failed: HTTP $STATUS"
            echo "Request body: $BODY"
            echo "Response body:"
            cat "$RESP_FILE"
            exit 1
          fi
          echo "CC /admin/nodes response: $(cat "$RESP_FILE")"
          CC_NODE_KEY=$(python3 -c "import json; print(json.load(open('$RESP_FILE'))['node_key'])")
          {
            echo "CC_NODE_ID=$NODE_ID"
            echo "CC_NODE_KEY=$CC_NODE_KEY"
          } >> "$GITHUB_ENV"
          echo "Captured CC_NODE_ID=$NODE_ID, CC_NODE_KEY length=${#CC_NODE_KEY}"

      - name: Run integration tests
        id: pytest
        continue-on-error: true
        env:
          FAKE_LLM_URL: http://127.0.0.1:7705
          FAKE_WHISPER_URL: http://127.0.0.1:7706
          # CC_URL is only set when the compose stack is up; the real-stack
          # tests use its presence as the gate for skipif. AUTH_URL and
          # CONFIG_URL point at the docker-compose.ci.yaml port mappings.
          CC_URL: ${{ steps.payload.outputs.bring_up_stack == 'true' && 'http://localhost:7703' || '' }}
          AUTH_URL: http://localhost:7701
          CONFIG_URL: http://localhost:7700
          # CC's seeded app credentials — CASE-201 validates them against
          # auth's /internal/validate-app to confirm the seed worked.
          CC_APP_ID: command-center
          CC_APP_KEY: ${{ env.CC_APP_KEY }}
          # v2.4 — seeded node credentials for the positive-path
          # /internal/validate-node test (CASE-202). Both are set by
          # compose/seed.sh via $GITHUB_ENV; empty when bring_up_stack=false,
          # in which case CASE-202's skipif gate fires.
          CC_NODE_ID: ${{ env.CC_NODE_ID }}
          CC_NODE_KEY: ${{ env.CC_NODE_KEY }}
          # v2.13 — user JWT + MQTT broker URL for CASE-212. CC's user-
          # JWT-gated endpoints (e.g. /nodes/.../settings/requests) need
          # the access_token captured from /auth/register. MQTT_BROKER_URL
          # points at the compose-mapped mosquitto port on the runner host.
          CC_USER_JWT: ${{ env.CC_USER_JWT }}
          MQTT_BROKER_URL: tcp://127.0.0.1:1883
        run: |
          pytest tests/test_loop_smoke.py tests/test_cc_real_smoke.py tests/test_cc_auth_contracts.py \
            --junit-xml=results.xml \
            --tb=short \
            -v

      - name: Parse results into JSON
        if: always()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [[ ! -f results.xml ]]; then
            # Pytest never produced XML — synthesize an empty file so parse_junit
            # reports every planned case as not-implemented.
            echo '<?xml version="1.0"?><testsuites/>' > results.xml
          fi
          python tools/parse_junit.py results.xml \
            --plan-cases "${{ steps.payload.outputs.plan_cases }}" \
            --run-url "$RUN_URL" \
            --output results.json
          cat results.json

      - name: Render comment body
        if: always()
        run: |
          python <<'PYEOF' > comment.md
          import json

          data = json.load(open("results.json"))
          s = data["summary"]
          print("<!-- integration-test-results:v1 -->")
          print("## Integration test results")
          print()
          print(
              f"**{s['pass']} pass | {s['fail']} fail | {s['skipped']} skipped"
              f" | {s['not_implemented']} not-implemented** "
              f"(of {s['total']} cases)"
          )
          print()
          print("| Case | Status | Test |")
          print("| --- | --- | --- |")
          for case_id, info in sorted(data["cases"].items()):
              name = info["test_name"] or "(no test bound)"
              print(f"| `{case_id}` | {info['status']} | `{name}` |")
          fails = [
              (c, i) for c, i in data["cases"].items()
              if i["status"] == "fail" and i["failure_excerpt"]
          ]
          if fails:
              print()
              print("### Failures")
              for case_id, info in fails:
                  print(f"- **{case_id}** `{info['test_name']}`")
                  print(f"  ```")
                  print(f"  {info['failure_excerpt']}")
                  print(f"  ```")
          print()
          print(f"[CI run]({data['run_url']})")
          PYEOF

      - name: Post comment to originating PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.INTEGRATION_COMMENT_TOKEN }}
          ORIGINATING_REPO: ${{ steps.payload.outputs.originating_repo }}
          PR_NUMBER: ${{ steps.payload.outputs.pr_number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$ORIGINATING_REPO" --body-file comment.md

      - name: Post commit status on PR head SHA
        if: always()
        env:
          GH_TOKEN: ${{ secrets.INTEGRATION_COMMENT_TOKEN }}
          ORIGINATING_REPO: ${{ steps.payload.outputs.originating_repo }}
          HEAD_SHA: ${{ steps.payload.outputs.head_sha }}
        run: |
          PASS=$(python -c "import json; print(json.load(open('results.json'))['summary']['pass'])")
          FAIL=$(python -c "import json; print(json.load(open('results.json'))['summary']['fail'])")
          NOT_IMPL=$(python -c "import json; print(json.load(open('results.json'))['summary']['not_implemented'])")
          TOTAL=$(python -c "import json; print(json.load(open('results.json'))['summary']['total'])")
          if [[ "$FAIL" -gt 0 || "$NOT_IMPL" -gt 0 ]]; then
            STATE="failure"
            DESC="$PASS/$TOTAL pass · $FAIL fail · $NOT_IMPL not-implemented"
          else
            STATE="success"
            DESC="$PASS/$TOTAL pass"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh api \
            --method POST \
            "/repos/$ORIGINATING_REPO/statuses/$HEAD_SHA" \
            -f "state=$STATE" \
            -f "context=jarvis-integration" \
            -f "description=$DESC" \
            -f "target_url=$RUN_URL" || echo "::warning::status post failed"

      - name: Tail service logs on failure
        if: ${{ always() && steps.payload.outputs.bring_up_stack == 'true' }}
        run: |
          # CC logs are always interesting (every voice case hits it).
          # Auth/config-service get a tail too when they're the
          # service-under-test (build failures show up here).
          echo "=== CC compose logs (tail) ==="
          docker compose -f docker-compose.ci.yaml logs --tail=100 jarvis-command-center || true
          echo "=== auth compose logs (tail) ==="
          docker compose -f docker-compose.ci.yaml logs --tail=50 jarvis-auth || true
          echo "=== config-service compose logs (tail) ==="
          docker compose -f docker-compose.ci.yaml logs --tail=50 jarvis-config-service || true
          echo "=== postgres logs (tail) ==="
          docker compose -f docker-compose.ci.yaml logs --tail=30 postgres || true

      - name: Tear down compose stack
        if: ${{ always() && steps.payload.outputs.bring_up_stack == 'true' }}
        run: |
          # The overlay isn't required for `down` (no build needed), but
          # passing it keeps the compose project name + service set
          # consistent with `up`, which prevents stale containers.
          docker compose -f docker-compose.ci.yaml \
            ${{ steps.payload.outputs.compose_overlay && format('-f {0}', steps.payload.outputs.compose_overlay) || '' }} \
            --profile core down -v --remove-orphans || true

      - name: Cleanup fake processes
        if: always()
        run: |
          kill "${FAKE_LLM_PID:-0}" "${FAKE_WHISPER_PID:-0}" "${FAKE_TTS_PID:-0}" 2>/dev/null || true
          echo "=== fake_llm.log ===" && cat /tmp/fake_llm.log || true
          echo "=== fake_whisper.log ===" && cat /tmp/fake_whisper.log || true
          echo "=== fake_tts.log ===" && cat /tmp/fake_tts.log || true
