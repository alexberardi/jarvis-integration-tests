# Compose overlay used when a PR in jarvis-auth is the service-under-test.
# Replaces the default `image: ghcr.io/alexberardi/jarvis-auth:dev` in
# docker-compose.ci.yaml with a `build:` block pointing at the PR's
# checked-out source.
#
# Invoked as:
#     docker compose -f docker-compose.ci.yaml \
#                    -f compose/ci-overlays/jarvis-auth-from-source.yaml \
#                    --profile core up -d --wait jarvis-auth
#
# The runner workflow handles passing both `-f` flags.

name: jarvis-ci

services:
  jarvis-auth:
    # Force the build on a plain `up`: image+build coexist (base keeps :dev), and
    # `docker compose up` without --build PULLS the pullable :dev tag and skips
    # the build, silently testing :dev not the PR. See T10 / the CC overlay note.
    pull_policy: build
    build:
      context: ${AUTH_SOURCE_PATH:-./_src/jarvis-auth}
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
