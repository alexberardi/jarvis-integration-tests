# compose/ci-overlays/jarvis-llm-proxy-api-from-source.yaml
#
# T9 — FROM-SOURCE overlay for an llm-proxy PR. Brings up a REAL jarvis-llm-proxy
# built from the PR's checked-out source (NOT the :dev-cpu image) and repoints
# command-center at it, so the PR's actual code serves the OpenAI-compatible
# /v1/chat/completions contract CC depends on for every voice command — end to
# end through the real container, not the host fake.
#
# Backend is env-driven (default MOCK). In the T9 from-source lane and the T10
# cross-repo COMPOSITION case (CASE-401) it uses the MOCK backend: no weights, no
# key, deterministic. The MOCK backend echoes a fixed string with tool_calls=None
# (backends/mock_backend.py), so it proves the CONTRACT + WIRING (auth round-trip,
# API->model-service internal proxy, OpenAI response shaping, MOCK passthrough),
# NOT tool routing. The T10 cross-repo ROUTING variant (CASE-402, key-gated) sets
# LLM_PROXY_FS_BACKEND=REST + OPENAI_API_KEY so this SAME from-source build points
# `live` at a cloud model (gpt-4.1-nano) — same trick as llm-proxy-behavior.yaml,
# but built from the PR's source instead of the :dev-cpu image. The two modes are
# mutually exclusive per bring-up (the backend is one or the other).
#
# Mirrors the two-process split from llm-proxy-behavior.yaml (one CPU image, two
# uvicorn entrypoints): the model service owns the backend; the stateless API
# server proxies to it. Both build from the same source context.
#
# Brought up by .github/workflows/from-source-services.yml with:
#   docker compose -f docker-compose.ci.yaml \
#       -f compose/ci-overlays/jarvis-llm-proxy-api-from-source.yaml \
#       --profile core --profile from-source up -d --wait \
#       jarvis-llm-proxy-model jarvis-llm-proxy-api

name: jarvis-ci

services:
  jarvis-llm-proxy-model:
    profiles: ["from-source"]
    # Build the model service from the PR source. Dockerfile.cpu is the CPU
    # variant (the default Dockerfile is CUDA and won't build on a GPU-less
    # runner); it's what publishes :dev-cpu on push to main.
    build:
      context: ${LLM_PROXY_SOURCE_PATH:-./_src/jarvis-llm-proxy-api}
      dockerfile: Dockerfile.cpu
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    # The image declares no CMD (run.sh is the host entrypoint); start the model
    # service directly. WORKDIR is /app, so services.model_service:app resolves.
    command: ["python", "-m", "uvicorn", "services.model_service:app", "--host", "0.0.0.0", "--port", "7705"]
    environment:
      # ---- backend defaults to MOCK (no weights, no key, deterministic) ----
      # model_manager reads these env fallbacks when no settings DB is present
      # (_create_backend: backend_type=="MOCK" -> MockBackend(model_path or
      # f"mock-{model_type}"), so no real path is required). Setting both aliases
      # the same makes them resolve to a single shared instance.
      #
      # The T9 from-source lane (from-source-services.yml) leaves LLM_PROXY_FS_*
      # unset -> MOCK, unchanged. The T10 cross-repo lane's key-gated ROUTING
      # variant (CASE-402) sets LLM_PROXY_FS_BACKEND=REST + LLM_PROXY_FS_MODEL_NAME
      # + OPENAI_API_KEY so the SAME from-source build serves a real cloud model
      # (gpt-4.1-nano) — no separate overlay. The REST_* keys below are only
      # consulted when backend==REST; they're harmless/ignored under MOCK.
      JARVIS_LIVE_MODEL_BACKEND: ${LLM_PROXY_FS_BACKEND:-MOCK}
      JARVIS_BACKGROUND_MODEL_BACKEND: ${LLM_PROXY_FS_BACKEND:-MOCK}
      JARVIS_LIVE_MODEL_NAME: ${LLM_PROXY_FS_MODEL_NAME:-mock}
      JARVIS_BACKGROUND_MODEL_NAME: ${LLM_PROXY_FS_MODEL_NAME:-mock}
      # REST -> cloud config (mirrors llm-proxy-behavior.yaml). OPENAI_API_KEY is
      # empty unless the routing variant injects it; under MOCK these go unread.
      JARVIS_LIVE_REST_MODEL_URL: ${LLM_PROXY_FS_REST_URL:-https://api.openai.com}
      JARVIS_REST_PROVIDER: openai
      JARVIS_REST_REQUEST_FORMAT: openai
      JARVIS_REST_AUTH_TYPE: bearer
      JARVIS_REST_AUTH_TOKEN: ${OPENAI_API_KEY:-}
      JARVIS_REST_MODEL_NAME: ${LLM_PROXY_FS_MODEL_NAME:-mock}
      # Internal-token guard for /internal/model/* — must match the API server.
      MODEL_SERVICE_TOKEN: ci-internal-token
      # Placeholders so the import chain (settings/pipeline routes resolve an auth
      # URL at module import; db session wants a valid URL) doesn't crash. Neither
      # Postgres nor auth is called on the MOCK chat path.
      JARVIS_AUTH_BASE_URL: http://jarvis-auth:8000
      DATABASE_URL: "sqlite:////tmp/llmproxy.db"
      PYTHONUNBUFFERED: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7705/health"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  jarvis-llm-proxy-api:
    profiles: ["from-source"]
    build:
      context: ${LLM_PROXY_SOURCE_PATH:-./_src/jarvis-llm-proxy-api}
      dockerfile: Dockerfile.cpu
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "7704"]
    depends_on:
      jarvis-llm-proxy-model:
        condition: service_healthy
    environment:
      # The API server proxies /v1/chat/completions -> model service.
      MODEL_SERVICE_URL: http://jarvis-llm-proxy-model:7705
      MODEL_SERVICE_TOKEN: ci-internal-token
      LLM_PROXY_INTERNAL_TOKEN: ci-internal-token
      # require_app_auth forwards the CALLER's (CC's) X-Jarvis-App-Id/Key to
      # jarvis-auth /internal/app-ping; it needs only the auth base URL, not its
      # own creds. CC's seeded `command-center` app-key validates here.
      JARVIS_AUTH_BASE_URL: http://jarvis-auth:8000
      DATABASE_URL: "sqlite:////tmp/llmproxy.db"
      PYTHONUNBUFFERED: "1"
    ports:
      # Exposed so the test client (and a failed-run debugger) can hit the real
      # proxy directly; CC reaches it over the compose network by service name.
      - "7704:7704"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7704/health"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  # Repoint command-center at the REAL proxy's API server (7704) instead of the
  # host fake LLM. Merge-only override — the base service's `core` profile,
  # image, and other env are inherited. (Belt-and-suspenders with the
  # config-service registration seed.sh does when LLM_PROXY_HOST is set.)
  jarvis-command-center:
    environment:
      JARVIS_LLM_PROXY_API_URL: http://jarvis-llm-proxy-api:7704
